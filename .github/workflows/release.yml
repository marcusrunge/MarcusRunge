name: Publish NuGet

on:
  push:
    branches:
      - release

jobs:
  publish:
    runs-on: windows-latest
    environment: nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MarcusRunge.slnx

      - name: Build
        run: dotnet build MarcusRunge.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack MarcusRunge.slnx --configuration Release --no-build --output ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push "./artifacts/*.nupkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate