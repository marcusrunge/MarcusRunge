name: Publish NuGet

on:
  push:
    branches:
      - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: windows-latest
    environment: nuget

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore MarcusRunge.slnx

      - name: Build
        run: dotnet build MarcusRunge.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack MarcusRunge.slnx --configuration Release --no-build --output ./artifacts

      - name: Show packages
        shell: pwsh
        run: |
          Get-ChildItem -Path ./artifacts -Recurse

      - name: Push to NuGet
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path ./artifacts -Filter *.nupkg -Recurse |
            Where-Object { $_.Name -notlike "*.symbols.nupkg" }

          if ($packages.Count -eq 0) {
            throw "No .nupkg files found in ./artifacts"
          }

          foreach ($package in $packages) {
            Write-Host "Pushing $($package.FullName)"

            dotnet nuget push $package.FullName `
              --api-key "${{ secrets.NUGET_API_KEY }}" `
              --source "https://api.nuget.org/v3/index.json" `
              --skip-duplicate
          }